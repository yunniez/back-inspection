<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뒷조사 — SNS 프로필 추리</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  :root{
    --bg:#FFF9F4; --card:#FFFFFF; --ink:#23242B; --sub:#8A8D98; --line:#F0EBE4;
    --pink:#FF5C8A; --violet:#8E6BFF;
    --grad:linear-gradient(135deg,#FF5C8A 0%,#FF8E53 50%,#8E6BFF 100%);
    --ok:#2FB673; --bad:#FF4D6D; --radius:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

  /* ── 스크롤 모델: #app 이 유일한 스크롤 컨테이너 ──
     body 스크롤에 의존하지 않아 환경별 스크롤 막힘을 원천 차단 */
  html,body{height:100%;overflow:hidden}
  body{background:#F3EEE7;color:var(--ink);
    font-family:'Pretendard Variable',Pretendard,-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    display:flex;justify-content:center}
  #app{width:100%;max-width:460px;height:100dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;
    background:var(--bg);display:flex;flex-direction:column}
  /* PC: 넓은 2컬럼 레이아웃 */
  @media(min-width:900px){
    #app{max-width:1040px;background:var(--bg)}
  }

  .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;background:rgba(255,249,244,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .logo{font-weight:800;font-size:20px;letter-spacing:-.5px;cursor:pointer}
  .logo em{font-style:normal;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hearts{display:flex;gap:4px;font-size:18px}
  .hearts .off{filter:grayscale(1);opacity:.3}
  .topbar .back{border:none;background:none;font-size:15px;color:var(--sub);cursor:pointer;font-family:inherit}

  .home{padding:26px 20px 40px;display:flex;flex-direction:column;gap:14px;max-width:560px;width:100%;margin:0 auto}
  .home h1{font-size:26px;font-weight:800;letter-spacing:-.6px;line-height:1.3}
  .home .desc{color:var(--sub);font-size:14px;line-height:1.6;margin-bottom:6px}
  .mode-label{font-size:13px;font-weight:700;color:var(--sub);letter-spacing:.06em;margin-top:10px}
  .level-card,.daily-card{display:flex;align-items:center;gap:14px;background:var(--card);
    border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;cursor:pointer;
    text-align:left;width:100%;font-family:inherit;transition:transform .12s ease,box-shadow .12s ease}
  .level-card:not(.locked):hover,.daily-card:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(35,36,43,.07)}
  .level-card:focus-visible,.daily-card:focus-visible,.chip:focus-visible,.btn:focus-visible,.cell:focus-visible,.tab:focus-visible{outline:3px solid var(--violet);outline-offset:2px}
  .level-card.locked{opacity:.45;cursor:not-allowed}
  .lv-ava{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;background:var(--bg);flex-shrink:0}
  .lv-ava.ring{background:var(--grad);padding:2.5px}
  .lv-ava.ring span{width:100%;height:100%;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center}
  .lv-info{flex:1;min-width:0}
  .lv-info .t{font-weight:700;font-size:15px}
  .lv-info .s{font-size:13px;color:var(--sub);margin-top:2px}
  .lv-state{font-size:18px}
  .daily-card{background:linear-gradient(135deg,#FFF0F5,#F3EFFF);border:none}

  /* ── 게임 레이아웃: 모바일 1컬럼 / PC 2컬럼 ── */
  .game{padding:16px 16px 118px;display:flex;flex-direction:column;gap:10px}
  @media(min-width:900px){
    .game{display:grid;grid-template-columns:400px 1fr;gap:0 22px;align-items:start;padding:20px 24px 48px}
    .col-left{position:sticky;top:76px;display:flex;flex-direction:column;gap:10px}
    .col-right{display:flex;flex-direction:column;gap:10px;min-width:0}
  }
  .col-left,.col-right{display:flex;flex-direction:column;gap:10px}

  .sec-label{font-size:12px;font-weight:800;color:var(--sub);letter-spacing:.08em;
    padding:8px 6px 2px;display:flex;align-items:center;gap:6px}
  .sec-label .n{width:18px;height:18px;border-radius:50%;background:var(--grad);color:#fff;
    display:inline-flex;align-items:center;justify-content:center;font-size:11px}
  .sec-label .prog{margin-left:auto;font-weight:700;color:var(--sub);letter-spacing:0}

  /* [1] 추리 보드 */
  .board{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px}
  .board .guide{font-size:12.5px;color:var(--sub);margin-bottom:12px;line-height:1.5}
  .slots{display:flex;flex-wrap:wrap;gap:8px}
  .chip{border:1.5px dashed #D9D2C8;background:var(--bg);border-radius:999px;
    padding:8px 14px;font-size:13.5px;font-weight:600;font-family:inherit;cursor:pointer;
    color:var(--ink);display:inline-flex;gap:6px;align-items:center;
    transition:border-color .15s,background .15s}
  .chip .k{color:var(--sub);font-weight:500}
  .chip .v{font-weight:700}
  .chip.ok{border-style:solid;border-color:var(--ok);background:#EAF8F1;cursor:default}
  .chip.ok .v::after{content:' ✓';color:var(--ok)}
  .chip.bad{border-style:solid;border-color:var(--bad);background:#FFF0F3;animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  /* 보드 내 힌트 버튼 (PC에서 표시) */
  .board .hint-inline{display:none;margin-top:12px;width:100%}
  @media(min-width:900px){.board .hint-inline{display:block}}

  /* [2] 단서 피드 */
  .feed{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  .ig-top{padding:18px 18px 0}
  .ig-head{display:flex;align-items:center;gap:18px}
  .p-ava{width:72px;height:72px;border-radius:50%;background:var(--grad);padding:3px;flex-shrink:0}
  .p-ava span{width:100%;height:100%;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:34px}
  .ig-stats{flex:1;display:flex;justify-content:space-around;text-align:center}
  .ig-stats b{display:block;font-size:16px;font-weight:800}
  .ig-stats span{font-size:12px;color:var(--sub)}
  .ig-name{font-weight:800;font-size:15px;margin-top:12px}
  .ig-handle{font-size:12.5px;color:var(--sub)}
  .ig-bio{font-size:13.5px;line-height:1.55;color:#4A4C57;margin-top:6px;padding-bottom:14px}
  .tabs{display:flex;border-top:1px solid var(--line)}
  .tab{flex:1;border:none;background:none;font-family:inherit;font-size:13.5px;font-weight:700;
    color:var(--sub);padding:12px 0;cursor:pointer;border-top:2px solid transparent;margin-top:-1px;
    display:flex;align-items:center;justify-content:center;gap:6px}
  .tab.on{color:var(--ink);border-top-color:var(--ink)}
  .tab .badge{background:var(--pink);color:#fff;font-size:10.5px;font-weight:800;border-radius:999px;padding:1px 6px}

  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:var(--line)}
  .cell{aspect-ratio:1;border:none;cursor:pointer;position:relative;font-family:inherit;
    display:flex;align-items:center;justify-content:center;font-size:38px;padding:0}
  @media(min-width:900px){.cell{font-size:46px}}
  .cell:hover{filter:brightness(.96)}
  .cell.fresh{animation:pop .35s ease}
  @keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
  .cell .cm-mark{position:absolute;top:6px;right:8px;font-size:12px;filter:drop-shadow(0 1px 1px rgba(0,0,0,.15))}
  .cell .new{position:absolute;bottom:6px;left:8px;font-size:9.5px;font-weight:800;color:#fff;
    background:var(--pink);border-radius:999px;padding:2px 7px;letter-spacing:.05em}

  .dm-list{display:flex;flex-direction:column}
  .dm-item{display:flex;align-items:center;gap:12px;padding:14px 18px;border:none;background:none;
    font-family:inherit;cursor:pointer;text-align:left;border-bottom:1px solid var(--line);width:100%}
  .dm-item:last-child{border-bottom:none}
  .dm-item:hover{background:var(--bg)}
  .dm-item .ava{width:44px;height:44px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
  .dm-item .info{flex:1;min-width:0}
  .dm-item .who{font-size:14px;font-weight:700}
  .dm-item .prev{font-size:12.5px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .dm-item .new{font-size:9.5px;font-weight:800;color:#fff;background:var(--pink);border-radius:999px;padding:2px 7px}
  .dm-empty{padding:34px 18px;text-align:center;color:var(--sub);font-size:13.5px}

  /* [3] 판정 — 모바일: 하단 고정 / PC: 보드 안 인라인 */
  .actions{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:460px;
    padding:10px 16px 20px;background:linear-gradient(to top,var(--bg) 75%,transparent);z-index:15}
  @media(min-width:900px){.actions{display:none}}
  .actions .row{display:flex;gap:10px}
  .btn{flex:1;border:none;border-radius:14px;padding:15px;font-size:15.5px;font-weight:800;
    font-family:inherit;cursor:pointer;letter-spacing:-.3px}
  .btn.primary{background:var(--grad);color:#fff}
  .btn.ghost{background:var(--card);border:1px solid var(--line);color:var(--ink)}
  .btn.ghost:disabled{opacity:.4;cursor:not-allowed}

  .overlay{position:fixed;inset:0;background:rgba(30,25,40,.5);z-index:30;display:flex;align-items:flex-end;justify-content:center}
  @media(min-width:600px){.overlay{align-items:center}}
  @keyframes up{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}

  .sheet{background:var(--card);width:100%;max-width:460px;border-radius:24px 24px 0 0;padding:22px 20px 28px;animation:up .22s ease}
  @media(min-width:600px){.sheet{border-radius:24px;margin:0 20px}}
  .sheet h3{font-size:16px;font-weight:800;margin-bottom:4px}
  .sheet .warn{font-size:12.5px;color:var(--pink);font-weight:600;margin-bottom:14px}
  .opt{display:block;width:100%;text-align:left;font-family:inherit;font-size:15px;font-weight:600;
    padding:14px 16px;border-radius:14px;border:1.5px solid var(--line);background:var(--card);
    margin-bottom:8px;cursor:pointer;color:var(--ink)}
  .opt:hover{border-color:var(--violet);background:#FBFAFF}
  .opt.dead{text-decoration:line-through;color:#C9C5BE;background:var(--bg);cursor:not-allowed;border-color:var(--line)}
  .opt.dead::after{content:'  오답';font-size:11.5px;text-decoration:none;color:var(--bad)}

  .post-view{background:var(--card);width:100%;max-width:460px;max-height:88dvh;
    border-radius:24px 24px 0 0;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:up .22s ease}
  @media(min-width:600px){.post-view{border-radius:24px;margin:0 20px;max-height:84dvh}}
  .pv-head{position:sticky;top:0;background:var(--card);z-index:2;display:flex;align-items:center;gap:10px;
    padding:14px 16px;border-bottom:1px solid var(--line)}
  .pv-head .ava{width:34px;height:34px;border-radius:50%;background:var(--grad);padding:2px;flex-shrink:0}
  .pv-head .ava span{width:100%;height:100%;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:16px}
  .pv-head .who{font-size:13.5px;font-weight:700}
  .pv-head .x{margin-left:auto;border:none;background:var(--bg);width:30px;height:30px;border-radius:50%;font-size:14px;cursor:pointer;color:var(--sub)}
  .pv-img{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:96px}
  .pv-actions{display:flex;gap:16px;padding:12px 16px 0;font-size:20px}
  .pv-likes{padding:8px 16px 0;font-size:13px;font-weight:800}
  .pv-cap{padding:6px 16px;font-size:14px;line-height:1.65;white-space:pre-wrap}
  .pv-cap b{margin-right:6px}
  .pv-date{padding:2px 16px 12px;font-size:11.5px;color:var(--sub)}
  .pv-cm-label{padding:10px 16px 4px;font-size:12px;font-weight:800;color:var(--sub);border-top:1px solid var(--line)}
  .pv-cm{display:flex;gap:10px;padding:10px 16px}
  .pv-cm .ava{width:30px;height:30px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
  .pv-cm .txt{font-size:13.5px;line-height:1.55}
  .pv-cm .txt b{margin-right:6px}
  .pv-cm .just{font-size:10.5px;color:var(--pink);font-weight:700;margin-left:6px}
  .pv-pad{height:14px}

  .chat{background:var(--card);width:100%;max-width:460px;max-height:80dvh;border-radius:24px 24px 0 0;
    display:flex;flex-direction:column;animation:up .22s ease}
  @media(min-width:600px){.chat{border-radius:24px;margin:0 20px}}
  .chat .pv-head{border-radius:24px 24px 0 0}
  .chat-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;display:flex;flex-direction:column;gap:8px}
  .bubble{max-width:78%;padding:10px 14px;font-size:14px;line-height:1.55;border-radius:18px;white-space:pre-wrap}
  .bubble.them{align-self:flex-start;background:var(--bg);border:1px solid var(--line);border-bottom-left-radius:6px}
  .bubble.me{align-self:flex-end;background:var(--grad);color:#fff;border-bottom-right-radius:6px}
  .chat-pad{height:16px;flex-shrink:0}

  .modal{background:var(--card);max-width:460px;width:calc(100% - 40px);margin:0 20px;border-radius:24px;padding:32px 24px;text-align:center;animation:up .22s ease}
  .modal .big{font-size:46px;margin-bottom:12px}
  .modal h2{font-size:20px;font-weight:800;margin-bottom:8px;letter-spacing:-.4px}
  .modal p{font-size:14px;color:var(--sub);line-height:1.6;margin-bottom:20px}
  .toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:40;background:#2B2C34;color:#fff;
    font-size:13.5px;font-weight:600;padding:11px 18px;border-radius:999px;animation:up .2s ease;white-space:nowrap;max-width:92%;text-align:center;overflow:hidden;text-overflow:ellipsis}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ══════════════ 퍼즐 데이터 ══════════════
   post.unlockBy : 이 슬롯을 맞히면 피드에 '새 게시물'로 올라온다 (null=처음부터 공개)
   설계 원칙:
   - 정답 단어는 게시물/댓글/DM 어디에도 직접 등장하지 않는다
   - 모든 슬롯은 처음부터 자유롭게 추리 가능. 다만 일부 슬롯의 결정적 단서는
     다른 항목을 맞혀야 올라오는 게시물 안에 있다 (찍기 리스크 vs 순서대로 파기)
   - trap = 오답 단어를 '남 얘기'로 흘려 함정을 판다
   - slot.hint = 힌트 사용 시 해당 게시물에 달리는 '새 댓글' */
const STORY = [
  {
    id:'s1', title:'첫 번째 의뢰', diff:'입문 · 슬롯 3개',
    profile:{ name:'김하늘', handle:'@haneul_daily', ava:'🌤️',
      bio:'하루하루 기록하는 중 ✍️ 좋아하는 것들로 채우는 일상', stats:{followers:318, following:127} },
    slots:[
      { key:'job',   label:'직업',     answer:'간호사', options:['간호사','승무원','개발자'],
        hint:{post:'p1', who:'동기 지혜', ava:'🩺', text:'이번 주 이브닝이지? 스테이션에 간식 두고 갈게'} },
      { key:'pet',   label:'반려동물', answer:'강아지', options:['고양이','강아지','햄스터'],
        hint:{post:'p2', who:'이웃', ava:'🌻', text:'다음엔 저희 애랑 같이 운동장에서 산책시켜요!'} },
      { key:'hobby', label:'취미',     answer:'베이킹', options:['등산','베이킹','게임'],
        hint:{post:'p3', who:'친구 수민', ava:'🍑', text:'오븐 새로 산 거 잘 돼? 저번 스콘 겉바속촉이었는데'} },
    ],
    posts:[
      { id:'p1', thumb:'🌙', likes:42, date:'2일 전', unlockBy:null,
        caption:'새벽 5시 퇴근.\n남들 출근할 때 나는 집에 간다. 3교대 3년차인데 이 리듬은 아직도 낯설다',
        comments:[{who:'동기 지혜',ava:'🩺',text:'수고했어~ 나는 데이 끝나고 이제 병동 나가'}] },
      { id:'p4', thumb:'🌅', likes:54, date:'6일 전', unlockBy:null,
        caption:'야간 마치고 보는 출근길 하늘.\n남들과 반대로 사는 삶에도 이런 보상은 있다', comments:[] },
      { id:'p5', thumb:'☕', likes:26, date:'1주 전', unlockBy:null,
        caption:'퇴근 후 한 잔.\n오늘의 나에게 주는 작은 선물', comments:[] },
      { id:'p2', thumb:'🐾', likes:87, date:'4일 전', unlockBy:'job',
        caption:'하루 두 번 산책은 국룰.\n비가 와도 현관 앞에서 목줄 물고 기다리는 그 눈빛을 이길 수가 없다',
        comments:[] },
      { id:'p3', thumb:'🧈', likes:31, date:'5일 전', unlockBy:'job',
        caption:'주말의 루틴.\n반죽 치대고 오븐 예열하는 동안 커피 한 잔. 집 안 가득 퍼지는 이 냄새가 좋다',
        comments:[] },
      { id:'p6', thumb:'🌸', likes:73, date:'2주 전', unlockBy:null,
        caption:'올해도 어김없이 폈다.\n일 년 중 제일 사진 많이 찍게 되는 시즌', comments:[] },
    ],
    dms:[],
  },
  {
    id:'s2', title:'두 번째 의뢰', diff:'보통 · 슬롯 4개',
    profile:{ name:'박준서', handle:'@junseo.log', ava:'🧢',
      bio:'기록하지 않으면 사라지니까 | 매일 조금씩', stats:{followers:542, following:203} },
    slots:[
      { key:'job',   label:'직업',      answer:'바리스타', options:['바리스타','회계사','사진작가'],
        hint:{post:'p1', who:'단골', ava:'📖', text:'핸드드립 원데이 클래스 또 안 열어요? 지난번 놓쳤어요'} },
      { key:'town',  label:'사는 동네', answer:'성수',     options:['홍대','성수','해운대'],
        hint:{post:'p2', who:'친구 민규', ava:'⚽', text:'서울숲 끼고 사는 거 진짜 부럽다'} },
      { key:'age',   label:'나이대',    answer:'30대',     options:['20대','30대','40대'],
        hint:{post:'p3', who:'동혁', ava:'🏀', text:'우리 스물에 만났는데 벌써 이만큼 왔네 ㅋㅋ'} },
      { key:'hobby', label:'취미',      answer:'러닝',     options:['러닝','낚시','볼링'],
        hint:{post:'p4', who:'크루 지원', ava:'👟', text:'그 페이스면 다음 대회 접수하셔야죠! 링크 드릴게요'} },
    ],

  'linear-gradient(135deg,#FFE9F0,#FFF3E4)','linear-gradient(135deg,#E9F3FF,#F0EAFF)',
  'linear-gradient(135deg,#EAFBF1,#F6FFE4)','linear-gradient(135deg,#FFF6E0,#FFEAEA)',

/* ══════════════ 상태 ══════════════ */
const MAX_HEARTS = 3;
const state = {
  screen:'home', mode:null, levelIdx:0,
  hearts:MAX_HEARTS,
  selections:{}, locked:{}, dead:{},
  cleared:new Set(), dailyCleared:false,
  feedTab:'grid',
  openSlot:null, openPost:null, openDm:null,
  viewedPosts:new Set(), viewedDms:new Set(),
  freshPosts:new Set(),     // 방금 해금돼 등장 애니메이션 대상
  modal:null,
};

function currentLevel(){
  if(state.mode==='daily'){
    const d=new Date();
    const seed=d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();
    return DAILY_POOL[seed%DAILY_POOL.length];
  }
  return STORY[state.levelIdx];
}
function todayLabel(){ const d=new Date(); return `${d.getMonth()+1}월 ${d.getDate()}일`; }
function postOpen(p){ return !p.unlockBy || state.locked[p.unlockBy]; }

/* ══════════════ 렌더 ══════════════ */
const app=document.getElementById('app');
function render(){ app.innerHTML = state.screen==='home'?viewHome():viewGame(); bind(); }
function heartsHtml(){ return Array.from({length:MAX_HEARTS},(_,i)=>`<span class="${i<state.hearts?'':'off'}">❤️</span>`).join(''); }

function viewHome(){
  const levels=STORY.map((lv,i)=>{
    const locked=i>0&&!state.cleared.has(i-1);
    const done=state.cleared.has(i);
    return `<button class="level-card ${locked?'locked':''}" data-story="${i}" ${locked?'disabled':''}>
      <div class="lv-ava ring"><span>${lv.profile.ava}</span></div>
      <div class="lv-info"><div class="t">레벨 ${i+1} · ${lv.title}</div>
      <div class="s">${lv.profile.name} ${lv.profile.handle} · ${lv.diff}</div></div>
      <div class="lv-state">${done?'✅':locked?'🔒':'▶️'}</div></button>`;
  }).join('');
  return `
  <div class="topbar"><div class="logo">뒷<em>조사</em></div><div class="hearts">${heartsHtml()}</div></div>
  <div class="home">
    <h1>프로필 뒤에 숨은<br>진짜 그 사람을 찾아라 🔍</h1>
    <p class="desc">단서를 읽고 프로필의 빈칸을 맞히세요. 하나를 맞힐 때마다 이 사람의 피드에 새 게시물이 올라옵니다 — 깊이 팔수록 더 많은 것이 보여요. 정답 단어는 어디에도 직접 나오지 않습니다.</p>
    <div class="mode-label">스토리 모드</div>${levels}
    <div class="mode-label">일일 퍼즐</div>
    <button class="daily-card" data-daily>
      <div class="lv-ava"><span>📅</span></div>
      <div class="lv-info"><div class="t">오늘의 퍼즐 · ${todayLabel()}</div>
      <div class="s">${state.dailyCleared?'클리어 완료! 내일 새 퍼즐이 도착해요':'매일 자정에 새로운 인물이 도착합니다'}</div></div>
      <div class="lv-state">${state.dailyCleared?'✅':'▶️'}</div></button>
  </div>`;
}

function viewGame(){
  const lv=currentLevel();

  const chips=lv.slots.map(s=>{
    const sel=state.selections[s.key];
    let cls;
    if(state.locked[s.key]) cls='ok';
    else if(s._bad) cls='bad';
    else cls='';
    return `<button class="chip ${cls}" data-slot="${s.key}" ${state.locked[s.key]?'disabled':''}>
      <span class="k">${s.label}</span><span class="v">${state.locked[s.key]?sel:'???'}</span></button>`;
  }).join('');
  const solved=lv.slots.filter(s=>state.locked[s.key]).length;

  const st=lv.profile.stats;
  const openPosts=lv.posts.filter(postOpen);
  const grid=openPosts.map((p)=>{
    const i=lv.posts.indexOf(p);
    return `<button class="cell ${state.freshPosts.has(p.id)?'fresh':''}" data-post="${p.id}"
      style="background:${CELL_BG[i%CELL_BG.length]}" aria-label="게시물 열기">
      ${p.thumb}${p.comments.length?'<span class="cm-mark">💬</span>':''}
      ${state.viewedPosts.has(p.id)?'':'<span class="new">NEW</span>'}</button>`;
  }).join('');

  const dmList=lv.dms.length
    ? lv.dms.map((d,i)=>`<button class="dm-item" data-dm="${i}">
        <div class="ava">${d.ava}</div>
        <div class="info"><div class="who">${d.who}</div><div class="prev">${d.preview}</div></div>
        ${state.viewedDms.has(i)?'':'<span class="new">NEW</span>'}</button>`).join('')
    : `<div class="dm-empty">받은 DM이 없습니다.<br>모든 단서는 게시물과 댓글 속에 있어요.</div>`;
  const unreadDm=lv.dms.filter((_,i)=>!state.viewedDms.has(i)).length;
  const hiddenCount=lv.posts.length-openPosts.length;

  return `
  <div class="topbar"><button class="back" data-back>← 홈</button>
    <div class="logo">뒷<em>조사</em></div><div class="hearts">${heartsHtml()}</div></div>
  <div class="game">
    <div class="col-left">
      <div class="sec-label"><span class="n">1</span>추리 보드<span class="prog">${solved} / ${lv.slots.length}</span></div>
      <div class="board">
        <div class="guide">항목을 눌러 바로 판정. 맞히면 피드에 새 게시물이 올라오고, 틀리면 하트 −1 (오답은 소거)</div>
        <div class="slots">${chips}</div>
        <button class="btn ghost hint-inline" data-hint>💡 힌트 — 피드에 제보 댓글이 달려요</button>
      </div>
    </div>

    <div class="col-right">
      <div class="sec-label"><span class="n">2</span>단서 피드 — ${lv.profile.handle}
        ${hiddenCount?`<span class="prog">숨겨진 게시물 ${hiddenCount}</span>`:''}</div>
      <div class="feed">
        <div class="ig-top">
          <div class="ig-head">
            <div class="p-ava"><span>${lv.profile.ava}</span></div>
            <div class="ig-stats">
              <div><b>${openPosts.length}</b><span>게시물</span></div>
              <div><b>${st.followers}</b><span>팔로워</span></div>
              <div><b>${st.following}</b><span>팔로잉</span></div>
            </div>
          </div>
          <div class="ig-name">${lv.profile.name}</div>
          <div class="ig-handle">${lv.profile.handle}</div>
          <div class="ig-bio">${lv.profile.bio}</div>
        </div>
        <div class="tabs">
          <button class="tab ${state.feedTab==='grid'?'on':''}" data-tab="grid">▦ 게시물</button>
          <button class="tab ${state.feedTab==='dm'?'on':''}" data-tab="dm">✉️ DM ${unreadDm?`<span class="badge">${unreadDm}</span>`:''}</button>
        </div>
        ${state.feedTab==='grid'?`<div class="grid">${grid}</div>`:`<div class="dm-list">${dmList}</div>`}
      </div>
    </div>
  </div>
  <div class="actions">
    <div class="row"><button class="btn ghost" data-hint>💡 힌트 — 피드에 제보 댓글이 달려요</button></div>
  </div>
  ${state.openSlot?viewSheet(lv):''}
  ${state.openPost?viewPost(lv):''}
  ${state.openDm!==null?viewChat(lv):''}
  ${state.modal?viewModal(lv):''}`;
}

function viewSheet(lv){
  const slot=lv.slots.find(s=>s.key===state.openSlot);
  const dead=state.dead[slot.key]||[];
  const opts=slot.options.map(o=>{
    const isDead=dead.includes(o);
    return `<button class="opt ${isDead?'dead':''}" data-opt="${o}" ${isDead?'disabled':''}>${o}</button>`;
  }).join('');
  return `<div class="overlay" data-close>
    <div class="sheet" role="dialog" aria-label="${slot.label} 선택">
      <h3>${slot.label} — 누구일까요?</h3>
      <div class="warn">한 번 고르면 바로 판정돼요. 틀리면 하트가 깎입니다</div>
      ${opts}
    </div></div>`;
}

function viewPost(lv){
  const idx=lv.posts.findIndex(p=>p.id===state.openPost);
  const p=lv.posts[idx];
  const cms=p.comments.map(c=>`<div class="pv-cm"><div class="ava">${c.ava}</div>
    <div class="txt"><b>${c.who}</b>${c.text}${c.isHint?'<span class="just">방금</span>':''}</div></div>`).join('');
  return `<div class="overlay" data-close>
    <div class="post-view" role="dialog" aria-label="게시물 상세">
      <div class="pv-head"><div class="ava"><span>${lv.profile.ava}</span></div>
        <div><div class="who">${lv.profile.name}</div></div>
        <button class="x" data-x aria-label="닫기">✕</button></div>
      <div class="pv-img" style="background:${CELL_BG[idx%CELL_BG.length]}">${p.thumb}</div>
      <div class="pv-actions"><span>🤍</span><span>💬</span><span>📤</span></div>
      <div class="pv-likes">좋아요 ${p.likes}개</div>
      <div class="pv-cap"><b>${lv.profile.handle.slice(1)}</b>${p.caption}</div>
      <div class="pv-date">${p.date}</div>
      ${p.comments.length?`<div class="pv-cm-label">댓글 ${p.comments.length}개</div>${cms}`:''}
      <div class="pv-pad"></div>
    </div></div>`;
}

function viewChat(lv){
  const d=lv.dms[state.openDm];
  const msgs=d.msgs.map(m=>`<div class="bubble ${m.from}">${m.text}</div>`).join('');
  return `<div class="overlay" data-close>
    <div class="chat" role="dialog" aria-label="DM 대화">
      <div class="pv-head"><div class="ava" style="background:var(--bg);padding:0"><span style="background:none">${d.ava}</span></div>
        <div><div class="who">${d.who}</div></div><button class="x" data-x aria-label="닫기">✕</button></div>
      <div class="chat-body">${msgs}</div><div class="chat-pad"></div>
    </div></div>`;
}

function viewModal(lv){
  if(state.modal.type==='win'){
    const hasNext=state.mode==='story'&&state.levelIdx<STORY.length-1;
    return `<div class="overlay"><div class="modal">
      <div class="big">🎉</div><h2>사건 해결!</h2>
      <p>${lv.profile.name} 님의 프로필을 전부 파악했습니다.<br>남은 하트: ${'❤️'.repeat(state.hearts)||'—'}</p>
      ${hasNext?`<button class="btn primary" data-next>다음 레벨 →</button>`:`<button class="btn primary" data-home>홈으로</button>`}
    </div></div>`;
  }
  return `<div class="overlay"><div class="modal">
    <div class="big">💔</div><h2>하트를 모두 잃었어요</h2>
    <p>단서를 다시 꼼꼼히 읽어보세요.<br>같은 레벨을 처음부터 다시 시작합니다.</p>
    <button class="btn primary" data-retry>다시 도전</button></div></div>`;
}

/* ══════════════ 이벤트 ══════════════ */
function bind(){
  app.querySelectorAll('[data-story]').forEach(b=>b.onclick=()=>startLevel('story',+b.dataset.story));
  const daily=app.querySelector('[data-daily]'); if(daily) daily.onclick=()=>startLevel('daily',0);
  const back=app.querySelector('[data-back]'); if(back) back.onclick=()=>{state.screen='home';closeAll();render();};

  app.querySelectorAll('.chip:not(.ok)').forEach(c=>c.onclick=()=>{ state.openSlot=c.dataset.slot; render(); });
  app.querySelectorAll('[data-tab]').forEach(t=>t.onclick=()=>{ state.feedTab=t.dataset.tab; render(); });

  app.querySelectorAll('[data-post]').forEach(c=>c.onclick=()=>{
    state.openPost=c.dataset.post; state.viewedPosts.add(c.dataset.post);
    state.freshPosts.delete(c.dataset.post); render(); });
  app.querySelectorAll('[data-dm]').forEach(c=>c.onclick=()=>{
    state.openDm=+c.dataset.dm; state.viewedDms.add(+c.dataset.dm); render(); });

  app.querySelectorAll('.overlay[data-close]').forEach(ov=>{ ov.onclick=e=>{ if(e.target===ov){closeAll();render();} }; });
  app.querySelectorAll('[data-x]').forEach(x=>x.onclick=()=>{ closeAll(); render(); });

  app.querySelectorAll('[data-opt]').forEach(o=>o.onclick=()=>pickOption(state.openSlot,o.dataset.opt));

  app.querySelectorAll('[data-hint]').forEach(h=>h.onclick=useHint);
  const next=app.querySelector('[data-next]'); if(next) next.onclick=()=>startLevel('story',state.levelIdx+1);
  const homeBtn=app.querySelector('[data-home]'); if(homeBtn) homeBtn.onclick=()=>{state.screen='home';state.modal=null;render();};
  const retry=app.querySelector('[data-retry]'); if(retry) retry.onclick=()=>startLevel(state.mode,state.levelIdx);
}

function closeAll(){ state.openSlot=null; state.openPost=null; state.openDm=null; state.modal=null; }

function startLevel(mode,idx){
  state.mode=mode; state.levelIdx=idx;
  state.hearts=MAX_HEARTS;
  state.selections={}; state.locked={}; state.dead={};
  state.feedTab='grid';
  state.viewedPosts=new Set(); state.viewedDms=new Set(); state.freshPosts=new Set();
  closeAll();
  const lv=(mode==='daily')
    ? DAILY_POOL[(new Date().getFullYear()*10000+(new Date().getMonth()+1)*100+new Date().getDate())%DAILY_POOL.length]
    : STORY[idx];
  lv.posts.forEach(p=>{ p.comments=p.comments.filter(c=>!c.isHint); });
  lv.slots.forEach(s=>{ s._bad=false; s._hintShown=false; });
  state.screen='game'; render();
}

/* 개별 채점: 맞으면 lock + 연결된 새 게시물이 피드에 등장, 틀리면 하트 -1 + 오답 소거 */
function pickOption(slotKey,val){
  const lv=currentLevel();
  const s=lv.slots.find(x=>x.key===slotKey);
  if(val===s.answer){
    state.selections[slotKey]=val;
    state.locked[slotKey]=true; s._bad=false;
    state.openSlot=null;
    const fresh=lv.posts.filter(p=>p.unlockBy===slotKey);
    fresh.forEach(p=>state.freshPosts.add(p.id));
    if(lv.slots.every(x=>state.locked[x.key])){
      if(state.mode==='story') state.cleared.add(state.levelIdx); else state.dailyCleared=true;
      state.modal={type:'win'}; render(); return;
    }
    if(fresh.length>0){
      state.feedTab='grid';
      toast(`정답! 📸 ${lv.profile.name} 님이 새 게시물 ${fresh.length}개를 올렸어요`);
    } else toast('정답!');
  } else {
    s._bad=true;
    state.dead[slotKey]=[...(state.dead[slotKey]||[]),val];
    state.hearts--;
    if(state.hearts<=0){ state.openSlot=null; state.modal={type:'over'}; render(); return; }
    toast('아니에요. 하트 −1, 오답은 지워둘게요');
  }
  render();
}

/* 힌트: 미해결 슬롯 중 '제보 댓글을 달 수 있는 공개 게시물'이 있는 슬롯에 새 댓글 */
function useHint(){
  const lv=currentLevel();
  const targets=lv.slots.filter(s=>{
    if(state.locked[s.key]||!s.hint||s._hintShown) return false;
    const post=lv.posts.find(p=>p.id===s.hint.post);
    return post && postOpen(post);
  });
  if(!targets.length){ toast('지금은 더 받을 제보가 없어요'); return; }
  const slot=targets[Math.floor(Math.random()*targets.length)];
  const post=lv.posts.find(p=>p.id===slot.hint.post);
  post.comments.push({who:slot.hint.who,ava:slot.hint.ava,text:slot.hint.text,isHint:true});
  slot._hintShown=true;
  state.viewedPosts.delete(post.id);
  state.feedTab='grid';
  toast('💡 누군가 피드에 새 댓글을 남겼어요');
  render();
}

let toastTimer=null;
function toast(msg){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.remove(),2400);
}

render();
</script>
</body>
