<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>뒷조사 — SNS 프로필 추리</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  :root{
    --bg:#FFF9F4;
    --card:#FFFFFF;
    --ink:#23242B;
    --sub:#8A8D98;
    --line:#F0EBE4;
    --pink:#FF5C8A;
    --violet:#8E6BFF;
    --grad:linear-gradient(135deg,#FF5C8A 0%,#FF8E53 50%,#8E6BFF 100%);
    --ok:#2FB673;
    --bad:#FF4D6D;
    --radius:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--ink);
    font-family:'Pretendard Variable',Pretendard,-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    display:flex;justify-content:center;
  }
  #app{width:100%;max-width:460px;min-height:100dvh;display:flex;flex-direction:column;background:var(--bg)}
  @media(min-width:600px){
    body{padding:24px 0}
    #app{min-height:calc(100dvh - 48px);border:1px solid var(--line);border-radius:28px;overflow:hidden;box-shadow:0 24px 60px rgba(35,36,43,.08)}
  }

  /* ── 상단 바 ── */
  .topbar{
    position:sticky;top:0;z-index:20;
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;background:rgba(255,249,244,.92);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .logo{font-weight:800;font-size:20px;letter-spacing:-.5px;cursor:pointer}
  .logo em{font-style:normal;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hearts{display:flex;gap:4px;font-size:18px}
  .hearts .off{filter:grayscale(1);opacity:.3}
  .topbar .back{border:none;background:none;font-size:15px;color:var(--sub);cursor:pointer;font-family:inherit}

  /* ── 홈 ── */
  .home{padding:26px 20px 40px;display:flex;flex-direction:column;gap:14px}
  .home h1{font-size:26px;font-weight:800;letter-spacing:-.6px;line-height:1.3}
  .home .desc{color:var(--sub);font-size:14px;line-height:1.6;margin-bottom:6px}
  .mode-label{font-size:13px;font-weight:700;color:var(--sub);letter-spacing:.06em;margin-top:10px}
  .level-card,.daily-card{
    display:flex;align-items:center;gap:14px;
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px 18px;cursor:pointer;text-align:left;width:100%;
    font-family:inherit;transition:transform .12s ease,box-shadow .12s ease;
  }
  .level-card:not(.locked):hover,.daily-card:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(35,36,43,.07)}
  .level-card:focus-visible,.daily-card:focus-visible,.chip:focus-visible,.btn:focus-visible,.cell:focus-visible,.tab:focus-visible{outline:3px solid var(--violet);outline-offset:2px}
  .level-card.locked{opacity:.45;cursor:not-allowed}
  .lv-ava{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;background:var(--bg);flex-shrink:0}
  .lv-ava.ring{background:var(--grad);padding:2.5px}
  .lv-ava.ring span{width:100%;height:100%;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center}
  .lv-info{flex:1;min-width:0}
  .lv-info .t{font-weight:700;font-size:15px}
  .lv-info .s{font-size:13px;color:var(--sub);margin-top:2px}
  .lv-state{font-size:18px}
  .daily-card{background:linear-gradient(135deg,#FFF0F5,#F3EFFF);border:none}

  /* ── 게임: 3영역 레이아웃 ── */
  .game{padding:16px 16px 130px;display:flex;flex-direction:column;gap:10px}
  .sec-label{
    font-size:12px;font-weight:800;color:var(--sub);letter-spacing:.08em;
    padding:8px 6px 2px;display:flex;align-items:center;gap:6px;
  }
  .sec-label .n{
    width:18px;height:18px;border-radius:50%;background:var(--grad);color:#fff;
    display:inline-flex;align-items:center;justify-content:center;font-size:11px;
  }

  /* [1] 추리 보드 */
  .board{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px}
  .board .guide{font-size:12.5px;color:var(--sub);margin-bottom:10px}
  .slots{display:flex;flex-wrap:wrap;gap:8px}
  .chip{
    border:1.5px dashed #D9D2C8;background:var(--bg);border-radius:999px;
    padding:8px 14px;font-size:13.5px;font-weight:600;font-family:inherit;cursor:pointer;
    color:var(--ink);display:flex;gap:6px;align-items:center;
    transition:border-color .15s,background .15s;
  }
  .chip .k{color:var(--sub);font-weight:500}
  .chip .v{font-weight:700}
  .chip.filled{border-style:solid;border-color:#CBB8FF;background:#F6F2FF}
  .chip.ok{border-style:solid;border-color:var(--ok);background:#EAF8F1;cursor:default}
  .chip.ok .v::after{content:' ✓';color:var(--ok)}
  .chip.bad{border-style:solid;border-color:var(--bad);background:#FFF0F3;animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  /* [2] 단서 피드 = 인스타 프로필 */
  .feed{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  .ig-top{padding:18px 18px 0}
  .ig-head{display:flex;align-items:center;gap:18px}
  .p-ava{width:72px;height:72px;border-radius:50%;background:var(--grad);padding:3px;flex-shrink:0}
  .p-ava span{width:100%;height:100%;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:34px}
  .ig-stats{flex:1;display:flex;justify-content:space-around;text-align:center}
  .ig-stats b{display:block;font-size:16px;font-weight:800}
  .ig-stats span{font-size:12px;color:var(--sub)}
  .ig-name{font-weight:800;font-size:15px;margin-top:12px}
  .ig-handle{font-size:12.5px;color:var(--sub)}
  .ig-bio{font-size:13.5px;line-height:1.55;color:#4A4C57;margin-top:6px;padding-bottom:14px}
  .tabs{display:flex;border-top:1px solid var(--line)}
  .tab{
    flex:1;border:none;background:none;font-family:inherit;font-size:13.5px;font-weight:700;
    color:var(--sub);padding:12px 0;cursor:pointer;border-top:2px solid transparent;margin-top:-1px;
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .tab.on{color:var(--ink);border-top-color:var(--ink)}
  .tab .badge{
    background:var(--pink);color:#fff;font-size:10.5px;font-weight:800;
    border-radius:999px;padding:1px 6px;
  }

  /* 9분할 그리드 */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:var(--line)}
  .cell{
    aspect-ratio:1;border:none;cursor:pointer;position:relative;font-family:inherit;
    display:flex;align-items:center;justify-content:center;font-size:38px;padding:0;
  }
  .cell:hover{filter:brightness(.96)}
  .cell .cm-mark{position:absolute;top:6px;right:8px;font-size:12px;filter:drop-shadow(0 1px 1px rgba(0,0,0,.15))}
  .cell .new{
    position:absolute;bottom:6px;left:8px;font-size:9.5px;font-weight:800;color:#fff;
    background:var(--pink);border-radius:999px;padding:2px 7px;letter-spacing:.05em;
  }

  /* DM 목록 */
  .dm-list{display:flex;flex-direction:column}
  .dm-item{
    display:flex;align-items:center;gap:12px;padding:14px 18px;border:none;background:none;
    font-family:inherit;cursor:pointer;text-align:left;border-bottom:1px solid var(--line);
  }
  .dm-item:last-child{border-bottom:none}
  .dm-item:hover{background:var(--bg)}
  .dm-item .ava{width:44px;height:44px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
  .dm-item .info{flex:1;min-width:0}
  .dm-item .who{font-size:14px;font-weight:700}
  .dm-item .prev{font-size:12.5px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .dm-item .new{font-size:9.5px;font-weight:800;color:#fff;background:var(--pink);border-radius:999px;padding:2px 7px}
  .dm-empty{padding:34px 18px;text-align:center;color:var(--sub);font-size:13.5px}

  /* ── [3] 판정 (하단 고정) ── */
  .actions{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:460px;padding:10px 16px 20px;
    background:linear-gradient(to top,var(--bg) 75%,transparent);
    z-index:15;
  }
  .actions .row{display:flex;gap:10px}
  .btn{
    flex:1;border:none;border-radius:14px;padding:15px;font-size:15.5px;font-weight:800;
    font-family:inherit;cursor:pointer;letter-spacing:-.3px;
  }
  .btn.primary{background:var(--grad);color:#fff}
  .btn.primary:disabled{background:#E4DFD8;color:#B0ACA4;cursor:not-allowed}
  .btn.ghost{flex:0 0 auto;background:var(--card);border:1px solid var(--line);color:var(--ink);padding:15px 18px}
  .btn.ghost:disabled{opacity:.4;cursor:not-allowed}

  /* ── 오버레이 공통 ── */
  .overlay{position:fixed;inset:0;background:rgba(30,25,40,.5);z-index:30;display:flex;align-items:flex-end;justify-content:center}
  @media(min-width:600px){.overlay{align-items:center}}
  @keyframes up{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}

  .sheet{
    background:var(--card);width:100%;max-width:460px;border-radius:24px 24px 0 0;
    padding:22px 20px 28px;animation:up .22s ease;
  }
  @media(min-width:600px){.sheet{border-radius:24px;margin:0 20px}}
  .sheet h3{font-size:16px;font-weight:800;margin-bottom:14px}
  .opt{
    display:block;width:100%;text-align:left;font-family:inherit;font-size:15px;font-weight:600;
    padding:14px 16px;border-radius:14px;border:1.5px solid var(--line);background:var(--card);
    margin-bottom:8px;cursor:pointer;color:var(--ink);
  }
  .opt:hover{border-color:var(--violet);background:#FBFAFF}

  /* 게시물 상세 (인스타 스타일) */
  .post-view{
    background:var(--card);width:100%;max-width:460px;max-height:88dvh;
    border-radius:24px 24px 0 0;overflow-y:auto;animation:up .22s ease;
  }
  @media(min-width:600px){.post-view{border-radius:24px;margin:0 20px;max-height:84dvh}}
  .pv-head{
    position:sticky;top:0;background:var(--card);z-index:2;
    display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line);
  }
  .pv-head .ava{width:34px;height:34px;border-radius:50%;background:var(--grad);padding:2px;flex-shrink:0}
  .pv-head .ava span{width:100%;height:100%;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:16px}
  .pv-head .who{font-size:13.5px;font-weight:700}
  .pv-head .x{margin-left:auto;border:none;background:var(--bg);width:30px;height:30px;border-radius:50%;font-size:14px;cursor:pointer;color:var(--sub)}
  .pv-img{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:96px}
  .pv-actions{display:flex;gap:16px;padding:12px 16px 0;font-size:20px}
  .pv-likes{padding:8px 16px 0;font-size:13px;font-weight:800}
  .pv-cap{padding:6px 16px;font-size:14px;line-height:1.65;white-space:pre-wrap}
  .pv-cap b{margin-right:6px}
  .pv-date{padding:2px 16px 12px;font-size:11.5px;color:var(--sub)}
  .pv-cm-label{padding:10px 16px 4px;font-size:12px;font-weight:800;color:var(--sub);border-top:1px solid var(--line)}
  .pv-cm{display:flex;gap:10px;padding:10px 16px}
  .pv-cm .ava{width:30px;height:30px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
  .pv-cm .txt{font-size:13.5px;line-height:1.55}
  .pv-cm .txt b{margin-right:6px}
  .pv-cm .just{font-size:10.5px;color:var(--pink);font-weight:700;margin-left:6px}
  .pv-pad{height:14px}

  /* DM 대화 (채팅) */
  .chat{
    background:var(--card);width:100%;max-width:460px;max-height:80dvh;
    border-radius:24px 24px 0 0;display:flex;flex-direction:column;animation:up .22s ease;
  }
  @media(min-width:600px){.chat{border-radius:24px;margin:0 20px}}
  .chat .pv-head{border-radius:24px 24px 0 0}
  .chat-body{overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
  .bubble{max-width:78%;padding:10px 14px;font-size:14px;line-height:1.55;border-radius:18px;white-space:pre-wrap}
  .bubble.them{align-self:flex-start;background:var(--bg);border:1px solid var(--line);border-bottom-left-radius:6px}
  .bubble.me{align-self:flex-end;background:var(--grad);color:#fff;border-bottom-right-radius:6px}
  .chat-pad{height:16px;flex-shrink:0}

  /* 결과 모달 & 토스트 */
  .modal{background:var(--card);max-width:460px;width:calc(100% - 40px);margin:0 20px;border-radius:24px;padding:32px 24px;text-align:center;animation:up .22s ease}
  .modal .big{font-size:46px;margin-bottom:12px}
  .modal h2{font-size:20px;font-weight:800;margin-bottom:8px;letter-spacing:-.4px}
  .modal p{font-size:14px;color:var(--sub);line-height:1.6;margin-bottom:20px}
  .toast{
    position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:40;
    background:#2B2C34;color:#fff;font-size:13.5px;font-weight:600;
    padding:11px 18px;border-radius:999px;animation:up .2s ease;white-space:nowrap;
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ══════════════ 퍼즐 데이터 ══════════════

/* 그리드 셀 배경 팔레트 */
const CELL_BG = [
  'linear-gradient(135deg,#FFE9F0,#FFF3E4)',
  'linear-gradient(135deg,#E9F3FF,#F0EAFF)',
  'linear-gradient(135deg,#EAFBF1,#F6FFE4)',
  'linear-gradient(135deg,#FFF6E0,#FFEAEA)',
  'linear-gradient(135deg,#F0EAFF,#FFE9F0)',
  'linear-gradient(135deg,#E4F7FF,#EAFBF1)',
];

/* ══════════════ 상태 ══════════════ */
const MAX_HEARTS = 3;
const state = {
  screen:'home',
  mode:null, levelIdx:0,
  hearts:MAX_HEARTS,
  selections:{}, locked:{},
  hintUsed:false,
  cleared:new Set(), dailyCleared:false,
  feedTab:'grid',
  openSlot:null, openPost:null, openDm:null,
  viewedPosts:new Set(), viewedDms:new Set(),
  modal:null,
};

function currentLevel(){
  if(state.mode==='daily'){
    const d = new Date();
    const seed = d.getFullYear()*10000 + (d.getMonth()+1)*100 + d.getDate();
    return DAILY_POOL[seed % DAILY_POOL.length];
  }
  return STORY[state.levelIdx];
}
function todayLabel(){
  const d = new Date();
  return `${d.getMonth()+1}월 ${d.getDate()}일`;
}

/* ══════════════ 렌더 ══════════════ */
const app = document.getElementById('app');

function render(){
  app.innerHTML = state.screen==='home' ? viewHome() : viewGame();
  bind();
}

function heartsHtml(){
  return Array.from({length:MAX_HEARTS},(_,i)=>
    `<span class="${i<state.hearts?'':'off'}">❤️</span>`).join('');
}

function viewHome(){
  const levels = STORY.map((lv,i)=>{
    const locked = i>0 && !state.cleared.has(i-1);
    const done = state.cleared.has(i);
    return `<button class="level-card ${locked?'locked':''}" data-story="${i}" ${locked?'disabled':''}>
      <div class="lv-ava ring"><span>${lv.profile.ava}</span></div>
      <div class="lv-info">
        <div class="t">레벨 ${i+1} · ${lv.title}</div>
        <div class="s">${lv.profile.name} ${lv.profile.handle} · ${lv.diff}</div>
      </div>
      <div class="lv-state">${done?'✅':locked?'🔒':'▶️'}</div>
    </button>`;
  }).join('');

  return `
  <div class="topbar">
    <div class="logo">뒷<em>조사</em></div>
    <div class="hearts">${heartsHtml()}</div>
  </div>
  <div class="home">
    <h1>프로필 뒤에 숨은<br>진짜 그 사람을 찾아라 🔍</h1>
    <p class="desc">게시물을 하나씩 열어보고, 댓글과 DM까지 뒤져서 프로필의 빈칸을 채우세요. 정답 단어는 절대 직접 나오지 않습니다. 오답을 제출하면 하트가 하나 사라져요.</p>
    <div class="mode-label">스토리 모드</div>
    ${levels}
    <div class="mode-label">일일 퍼즐</div>
    <button class="daily-card" data-daily>
      <div class="lv-ava"><span>📅</span></div>
      <div class="lv-info">
        <div class="t">오늘의 퍼즐 · ${todayLabel()}</div>
        <div class="s">${state.dailyCleared?'클리어 완료! 내일 새 퍼즐이 도착해요':'매일 자정에 새로운 인물이 도착합니다'}</div>
      </div>
      <div class="lv-state">${state.dailyCleared?'✅':'▶️'}</div>
    </button>
  </div>`;
}

function viewGame(){
  const lv = currentLevel();

  const chips = lv.slots.map(s=>{
    const sel = state.selections[s.key];
    const cls = state.locked[s.key] ? 'ok' : s._bad ? 'bad' : sel ? 'filled' : '';
    return `<button class="chip ${cls}" data-slot="${s.key}" ${state.locked[s.key]?'disabled':''}>
      <span class="k">${s.label}</span><span class="v">${sel||'???'}</span>
    </button>`;
  }).join('');

  const st = lv.profile.stats;
  const grid = lv.posts.map((p,i)=>`
    <button class="cell" data-post="${p.id}" style="background:${CELL_BG[i%CELL_BG.length]}" aria-label="게시물 열기">
      ${p.thumb}
      ${p.comments.length?'<span class="cm-mark">💬</span>':''}
      ${state.viewedPosts.has(p.id)?'':'<span class="new">NEW</span>'}
    </button>`).join('');

  const dmList = lv.dms.length
    ? lv.dms.map((d,i)=>`
      <button class="dm-item" data-dm="${i}">
        <div class="ava">${d.ava}</div>
        <div class="info">
          <div class="who">${d.who}</div>
          <div class="prev">${d.preview}</div>
        </div>
        ${state.viewedDms.has(i)?'':'<span class="new">NEW</span>'}
      </button>`).join('')
    : `<div class="dm-empty">받은 DM이 없습니다.<br>모든 단서는 게시물과 댓글 속에 있어요.</div>`;

  const unreadDm = lv.dms.filter((_,i)=>!state.viewedDms.has(i)).length;
  const allFilled = lv.slots.every(s=>state.selections[s.key]);

  return `
  <div class="topbar">
    <button class="back" data-back>← 홈</button>
    <div class="logo">뒷<em>조사</em></div>
    <div class="hearts">${heartsHtml()}</div>
  </div>
  <div class="game">

    <div class="sec-label"><span class="n">1</span>추리 보드</div>
    <div class="board">
      <div class="guide">칸을 눌러 단서로 알아낸 특징을 채우세요</div>
      <div class="slots">${chips}</div>
    </div>

    <div class="sec-label"><span class="n">2</span>단서 피드 — ${lv.profile.handle}</div>
    <div class="feed">
      <div class="ig-top">
        <div class="ig-head">
          <div class="p-ava"><span>${lv.profile.ava}</span></div>
          <div class="ig-stats">
            <div><b>${lv.posts.length}</b><span>게시물</span></div>
            <div><b>${st.followers}</b><span>팔로워</span></div>
            <div><b>${st.following}</b><span>팔로잉</span></div>
          </div>
        </div>
        <div class="ig-name">${lv.profile.name}</div>
        <div class="ig-handle">${lv.profile.handle}</div>
        <div class="ig-bio">${lv.profile.bio}</div>
      </div>
      <div class="tabs">
        <button class="tab ${state.feedTab==='grid'?'on':''}" data-tab="grid">▦ 게시물</button>
        <button class="tab ${state.feedTab==='dm'?'on':''}" data-tab="dm">✉️ DM ${unreadDm?`<span class="badge">${unreadDm}</span>`:''}</button>
      </div>
      ${state.feedTab==='grid' ? `<div class="grid">${grid}</div>` : `<div class="dm-list">${dmList}</div>`}
    </div>

  </div>
  <div class="actions">
    <div class="sec-label" style="padding:0 6px 6px"><span class="n">3</span>판정</div>
    <div class="row">
      <button class="btn ghost" data-hint ${state.hintUsed?'disabled':''}>💡 힌트</button>
      <button class="btn primary" data-check ${allFilled?'':'disabled'}>프로필 확인하기</button>
    </div>
  </div>
  ${state.openSlot ? viewSheet(lv) : ''}
  ${state.openPost ? viewPost(lv) : ''}
  ${state.openDm!==null ? viewChat(lv) : ''}
  ${state.modal ? viewModal(lv) : ''}`;
}

function viewSheet(lv){
  const slot = lv.slots.find(s=>s.key===state.openSlot);
  const opts = slot.options.map(o=>`<button class="opt" data-opt="${o}">${o}</button>`).join('');
  return `<div class="overlay" data-close>
    <div class="sheet" role="dialog" aria-label="${slot.label} 선택">
      <h3>${slot.label} — 단서를 보고 고르세요</h3>
      ${opts}
    </div>
  </div>`;
}

function viewPost(lv){
  const idx = lv.posts.findIndex(p=>p.id===state.openPost);
  const p = lv.posts[idx];
  const cms = p.comments.map(c=>`
    <div class="pv-cm">
      <div class="ava">${c.ava}</div>
      <div class="txt"><b>${c.who}</b>${c.text}${c.isHint?'<span class="just">방금</span>':''}</div>
    </div>`).join('');
  return `<div class="overlay" data-close>
    <div class="post-view" role="dialog" aria-label="게시물 상세">
      <div class="pv-head">
        <div class="ava"><span>${lv.profile.ava}</span></div>
        <div><div class="who">${lv.profile.name}</div></div>
        <button class="x" data-x aria-label="닫기">✕</button>
      </div>
      <div class="pv-img" style="background:${CELL_BG[idx%CELL_BG.length]}">${p.thumb}</div>
      <div class="pv-actions"><span>🤍</span><span>💬</span><span>📤</span></div>
      <div class="pv-likes">좋아요 ${p.likes}개</div>
      <div class="pv-cap"><b>${lv.profile.handle.slice(1)}</b>${p.caption}</div>
      <div class="pv-date">${p.date}</div>
      ${p.comments.length?`<div class="pv-cm-label">댓글 ${p.comments.length}개</div>${cms}`:''}
      <div class="pv-pad"></div>
    </div>
  </div>`;
}

function viewChat(lv){
  const d = lv.dms[state.openDm];
  const msgs = d.msgs.map(m=>`<div class="bubble ${m.from}">${m.text}</div>`).join('');
  return `<div class="overlay" data-close>
    <div class="chat" role="dialog" aria-label="DM 대화">
      <div class="pv-head">
        <div class="ava" style="background:var(--bg);padding:0"><span style="background:none">${d.ava}</span></div>
        <div><div class="who">${d.who}</div></div>
        <button class="x" data-x aria-label="닫기">✕</button>
      </div>
      <div class="chat-body">${msgs}</div>
      <div class="chat-pad"></div>
    </div>
  </div>`;
}

function viewModal(lv){
  if(state.modal.type==='win'){
    const isStory = state.mode==='story';
    const hasNext = isStory && state.levelIdx < STORY.length-1;
    return `<div class="overlay">
      <div class="modal">
        <div class="big">🎉</div>
        <h2>사건 해결!</h2>
        <p>${lv.profile.name} 님의 프로필을 완벽하게 파악했습니다.<br>남은 하트: ${'❤️'.repeat(state.hearts)}</p>
        ${hasNext
          ? `<button class="btn primary" data-next>다음 레벨 →</button>`
          : `<button class="btn primary" data-home>홈으로</button>`}
      </div>
    </div>`;
  }
  return `<div class="overlay">
    <div class="modal">
      <div class="big">💔</div>
      <h2>하트를 모두 잃었어요</h2>
      <p>단서를 다시 꼼꼼히 읽어보세요.<br>같은 레벨을 처음부터 다시 시작합니다.</p>
      <button class="btn primary" data-retry>다시 도전</button>
    </div>
  </div>`;
}

/* ══════════════ 이벤트 ══════════════ */
function bind(){
  app.querySelectorAll('[data-story]').forEach(b=>b.onclick=()=>startLevel('story',+b.dataset.story));
  const daily = app.querySelector('[data-daily]');
  if(daily) daily.onclick = ()=>startLevel('daily',0);

  const back = app.querySelector('[data-back]');
  if(back) back.onclick = ()=>{ state.screen='home'; closeAll(); render(); };

  app.querySelectorAll('.chip:not(.ok)').forEach(c=>c.onclick=()=>{ state.openSlot=c.dataset.slot; render(); });
  app.querySelectorAll('[data-tab]').forEach(t=>t.onclick=()=>{ state.feedTab=t.dataset.tab; render(); });

  app.querySelectorAll('[data-post]').forEach(c=>c.onclick=()=>{
    state.openPost=c.dataset.post;
    state.viewedPosts.add(c.dataset.post);
    render();
  });
  app.querySelectorAll('[data-dm]').forEach(c=>c.onclick=()=>{
    state.openDm=+c.dataset.dm;
    state.viewedDms.add(+c.dataset.dm);
    render();
  });

  app.querySelectorAll('.overlay[data-close]').forEach(ov=>{
    ov.onclick = e=>{ if(e.target===ov){ closeAll(); render(); } };
  });
  app.querySelectorAll('[data-x]').forEach(x=>x.onclick=()=>{ closeAll(); render(); });

  app.querySelectorAll('[data-opt]').forEach(o=>o.onclick=()=>{
    state.selections[state.openSlot]=o.dataset.opt;
    currentLevel().slots.forEach(s=>{ if(s.key===state.openSlot) s._bad=false; });
    state.openSlot=null; render();
  });

  const hint = app.querySelector('[data-hint]');
  if(hint) hint.onclick = useHint;
  const check = app.querySelector('[data-check]');
  if(check) check.onclick = grade;
  const next = app.querySelector('[data-next]');
  if(next) next.onclick = ()=>startLevel('story', state.levelIdx+1);
  const homeBtn = app.querySelector('[data-home]');
  if(homeBtn) homeBtn.onclick = ()=>{ state.screen='home'; state.modal=null; render(); };
  const retry = app.querySelector('[data-retry]');
  if(retry) retry.onclick = ()=>startLevel(state.mode, state.levelIdx);
}

function closeAll(){
  state.openSlot=null; state.openPost=null; state.openDm=null; state.modal=null;
}

function startLevel(mode, idx){
  state.mode=mode; state.levelIdx=idx;
  state.hearts=MAX_HEARTS;
  state.selections={}; state.locked={};
  state.hintUsed=false; state.feedTab='grid';
  state.viewedPosts=new Set(); state.viewedDms=new Set();
  closeAll();
  const lv = (mode==='daily')
    ? DAILY_POOL[(new Date().getFullYear()*10000+(new Date().getMonth()+1)*100+new Date().getDate()) % DAILY_POOL.length]
    : STORY[idx];
  /* 이전 판에서 힌트로 달린 댓글 제거 + 상태 초기화 */
  lv.posts.forEach(p=>{ p.comments = p.comments.filter(c=>!c.isHint); });
  lv.slots.forEach(s=>{ s._bad=false; s._hintShown=false; });
  state.screen='game';
  render();
}

function grade(){
  const lv = currentLevel();
  let wrong = 0;
  lv.slots.forEach(s=>{
    if(state.locked[s.key]) return;
    if(state.selections[s.key]===s.answer){
      state.locked[s.key]=true; s._bad=false;
    } else {
      s._bad=true; wrong++;
    }
  });
  if(wrong===0){
    if(state.mode==='story') state.cleared.add(state.levelIdx);
    else state.dailyCleared=true;
    state.modal={type:'win'};
  } else {
    state.hearts--;
    if(state.hearts<=0) state.modal={type:'over'};
    else toast(`오답 ${wrong}개! 하트가 1개 줄었어요`);
  }
  render();
}

/* 힌트: 정답을 직접 알려주지 않고, 미해결 슬롯 하나와 관련된
   게시물에 '새 댓글'이 달린다. 어느 게시물인지는 NEW 뱃지로만 표시 */
function useHint(){
  const lv = currentLevel();
  const targets = lv.slots.filter(s=>!state.locked[s.key] && s.hint && !s._hintShown);
  if(!targets.length){ toast('더 받을 수 있는 제보가 없어요'); return; }
  const slot = targets[Math.floor(Math.random()*targets.length)];
  const post = lv.posts.find(p=>p.id===slot.hint.post);
  post.comments.push({who:slot.hint.who, ava:slot.hint.ava, text:slot.hint.text, isHint:true});
  slot._hintShown = true;
  state.viewedPosts.delete(post.id);   /* NEW 뱃지 다시 표시 */
  state.hintUsed = true;
  toast('💡 누군가 피드에 새 댓글을 남겼어요');
  render();
}

let toastTimer=null;
function toast(msg){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');
  t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.remove(),2200);
}

render();
</script>
